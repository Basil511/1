<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>إضافة للجرد — مستودع قطع الغيار</title>
<link rel="stylesheet" href="app.css">
<style>
.cam-ov{display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column}
.cam-ov.on{display:flex}
.cam-top{background:rgba(4,18,32,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(180,210,255,.12);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cam-body{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#scv{width:100%;height:100%;object-fit:cover}
.cam-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-box{width:260px;height:150px;position:relative}
.cc{position:absolute;width:30px;height:30px}
.cc-tl{top:0;right:0;border-top:3px solid var(--gn);border-right:3px solid var(--gn);border-radius:0 6px 0 0}
.cc-tr{top:0;left:0;border-top:3px solid var(--gn);border-left:3px solid var(--gn);border-radius:6px 0 0 0}
.cc-bl{bottom:0;right:0;border-bottom:3px solid var(--gn);border-right:3px solid var(--gn);border-radius:0 0 6px 0}
.cc-br{bottom:0;left:0;border-bottom:3px solid var(--gn);border-left:3px solid var(--gn);border-radius:0 0 0 6px}
.scl{position:absolute;right:0;left:0;height:2px;background:linear-gradient(90deg,transparent,var(--gn),transparent);top:50%;animation:smv 1.8s ease-in-out infinite}
@keyframes smv{0%,100%{top:8%}50%{top:88%}}
.cam-st{background:rgba(0,0,0,.80);backdrop-filter:blur(16px);border-top:1px solid rgba(180,210,255,.10);padding:14px;text-align:center;color:var(--tx);font-size:13px;flex-shrink:0;min-height:50px;display:flex;align-items:center;justify-content:center}
.cam-st.ok{color:var(--gn);font-weight:700}.cam-st.er{color:var(--rd)}
.dup-box{display:none;margin-top:10px;padding:12px 14px;background:linear-gradient(165deg,rgba(255,208,96,.16),rgba(255,208,96,.04));border-top:2px solid rgba(255,230,100,.48);border-left:1px solid rgba(255,208,96,.20);border-right:1px solid rgba(255,208,96,.12);border-bottom:1px solid rgba(0,0,0,.22);border-radius:14px;backdrop-filter:blur(20px)}
.dup-box.on{display:block}
.dup-row{background:rgba(0,0,0,.22);border-radius:9px;padding:6px 10px;font-size:11px;color:var(--tx2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;justify-content:space-between}
#dup-confirm{display:none;position:fixed;inset:0;z-index:9200;background:rgba(0,0,0,.72);backdrop-filter:blur(14px);align-items:center;justify-content:center;padding:20px}
#dup-confirm.on{display:flex}
.dc-card{background:linear-gradient(165deg,rgba(255,208,96,.18),rgba(8,30,70,.92));backdrop-filter:blur(52px);border-top:2px solid rgba(255,230,100,.58);border:1px solid rgba(255,208,96,.24);border-radius:26px;padding:30px 26px;width:100%;max-width:420px;text-align:center;box-shadow:inset 0 2px 0 rgba(255,240,120,.30),0 40px 90px rgba(0,0,0,.75)}
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="page-wrap">
  <div class="page-header">
    <div class="page-title"><h1>➕ إضافة للجرد</h1><p>تسجيل استلام قطع جديدة</p></div>
    <a href="withdraw.html" class="btn btn-danger">➖ انتقل للصرف</a>
  </div>
  <div class="page-body">
    <div style="display:grid;grid-template-columns:440px 1fr;gap:20px;align-items:start">
      <div class="glass glass-sm" style="padding:22px">
        <div class="field mb-12">
          <label>باركود المنتج</label>
          <div style="display:flex;gap:8px">
            <input class="g-input" id="bc" type="text" placeholder="امسح أو اكتب الباركود..." autocomplete="off" oninput="onBc(this.value)" onkeydown="if(event.key==='Enter')document.getElementById('nm').focus()" style="flex:1"/>
            <button class="btn btn-primary" onclick="opCam()" style="width:50px;justify-content:center;font-size:20px">📷</button>
          </div>
          <div class="dup-box" id="db">
            <div style="font-size:13px;font-weight:700;color:var(--yw);margin-bottom:8px">⚠️ هذا الباركود مسجل مسبقاً</div>
            <div id="dtl" style="display:flex;gap:14px;font-size:11px;color:var(--tx2);margin-bottom:8px;flex-wrap:wrap"></div>
            <div id="drs"></div>
          </div>
        </div>
        <div class="form-grid mb-12">
          <div class="field"><label>اسم المنتج</label><input class="g-input" id="nm" type="text" placeholder="مثال: فلتر زيت" oninput="onNm(this.value)" onkeydown="if(event.key==='Enter')document.getElementById('sz').focus()"/></div>
          <div class="field"><label>السعة / الوصف</label><input class="g-input" id="sz" type="text" placeholder="مثال: 1 لتر" onkeydown="if(event.key==='Enter')document.getElementById('qt').focus()"/></div>
          <div class="field"><label>الكمية المستلمة</label><input class="g-input" id="qt" type="number" value="1" min="1" onkeydown="if(event.key==='Enter')document.getElementById('pr').focus()"/></div>
          <div class="field"><label>سعر الوحدة (ر.س)</label><input class="g-input" id="pr" type="number" min="0" step="0.01" placeholder="0.00" onkeydown="if(event.key==='Enter')document.getElementById('lc').focus()"/></div>
          <div class="field"><label>الموقع في المستودع</label><input class="g-input" id="lc" type="text" placeholder="مثال: رف A3" onkeydown="if(event.key==='Enter')document.getElementById('sup').focus()"/></div>
          <div class="field"><label>المورد</label><select class="g-input g-select" id="sup"><option value="">— اختر مورد —</option></select></div>
          <div class="field" style="grid-column:span 2"><label>ملاحظة</label><input class="g-input" id="nt" type="text" placeholder="..." onkeydown="if(event.key==='Enter')sub()"/></div>
        </div>
        <button class="btn btn-success" onclick="sub()" style="width:100%;justify-content:center;font-size:15px;padding:14px">➕ إضافة للجرد</button>
      </div>
      <div class="glass glass-sm" style="padding:20px">
        <div class="flex-between mb-12">
          <div class="fw-bold" style="font-size:14px">آخر الإضافات</div>
          <div class="search-wrap"><span class="search-icon">🔍</span><input class="g-input" style="padding:8px 12px 8px 36px;font-size:13px;width:200px" placeholder="بحث..." oninput="filterEnt(this.value)"/></div>
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>المنتج</th><th>باركود</th><th>الكمية</th><th>السعر</th><th>الموقع</th><th>التاريخ</th><th></th></tr></thead>
          <tbody id="tb"></tbody>
        </table></div>
      </div>
    </div>
  </div>
</div>
<!-- Camera -->
<div class="cam-ov" id="cov">
  <div class="cam-top"><span style="color:var(--tx);font-size:15px;font-weight:700">📷 مسح الباركود</span><button class="btn btn-danger btn-sm" onclick="clCam()">إغلاق</button></div>
  <div class="cam-body"><video id="scv" playsinline muted></video>
    <div class="cam-frame"><div class="cam-box"><div class="cc cc-tl"></div><div class="cc cc-tr"></div><div class="cc cc-bl"></div><div class="cc cc-br"></div><div class="scl"></div></div></div>
  </div>
  <div class="cam-st" id="cst">جاري تشغيل الكاميرا...</div>
</div>
<!-- Dup confirm -->
<div id="dup-confirm">
  <div class="dc-card">
    <div style="font-size:44px;margin-bottom:12px">⚠️</div>
    <h3 style="font-size:17px;font-weight:900;color:var(--yw);margin-bottom:8px">باركود مسجل مسبقاً</h3>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:6px">منتج: <strong id="dc-name" style="color:var(--tx)"></strong></p>
    <p style="font-size:12px;color:var(--tx3);margin-bottom:20px">الرصيد الحالي: <strong id="dc-bal" style="color:var(--gn)">0</strong> · تضيف: <strong id="dc-qty" style="color:var(--gn)">0</strong></p>
    <p style="font-size:12px;color:var(--tx3);margin-bottom:20px">سيتم إضافة الكمية على رصيد المنتج الموجود</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-success" onclick="doConfirmAdd()" style="justify-content:center">أضف للرصيد ✓</button>
      <button class="btn btn-primary" onclick="document.getElementById('dup-confirm').classList.remove('on')" style="justify-content:center">إلغاء</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="scanner.js"></script>
<script src="db.js"></script>
<script src="nav.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderSidebar('add');
var session = DB.requireAuth();
var allEnt = [], filtEnt = [], _pending = null;

// Load suppliers
function loadSup() {
  var sel = document.getElementById('sup');
  sel.innerHTML = '<option value="">— اختر مورد —</option>';
  DB.getSuppliers().forEach(function(s){ sel.innerHTML += '<option value="'+s.name+'">'+s.name+'</option>'; });
}
loadSup();

var bct, nmTm;
function onBc(v) {
  clearTimeout(bct); chkDup(v);
  if (v.length < 3) return;
  bct = setTimeout(function() {
    var p = DB.getEntries().find(function(e){ return e.barcode === v; });
    if (p) {
      if (!document.getElementById('nm').value) document.getElementById('nm').value = p.name||'';
      if (!document.getElementById('sz').value) document.getElementById('sz').value = p.size||'';
      if (!document.getElementById('lc').value) document.getElementById('lc').value = p.location||'';
      if (!document.getElementById('pr').value) document.getElementById('pr').value = p.price||'';
    }
  }, 280);
}
function onNm(v) {
  clearTimeout(nmTm); if (v.length < 2) return;
  nmTm = setTimeout(function() {
    var lv=v.toLowerCase();
    var m = DB.getEntries().find(function(e){ return e.name && e.name.toLowerCase().indexOf(lv)>=0; });
    if (m) {
      if (!document.getElementById('bc').value) { document.getElementById('bc').value=m.barcode; onBc(m.barcode); }
      if (!document.getElementById('sz').value) document.getElementById('sz').value=m.size||'';
      if (!document.getElementById('lc').value) document.getElementById('lc').value=m.location||'';
      if (!document.getElementById('pr').value) document.getElementById('pr').value=m.price||'';
    }
  }, 350);
}

function chkDup(v) {
  var box = document.getElementById('db');
  if (!v||v.length<3) { box.classList.remove('on'); return; }
  var m = DB.getEntries().filter(function(e){ return e.barcode===v; });
  if (!m.length) { box.classList.remove('on'); return; }
  box.classList.add('on');
  var inQ=m.filter(function(e){return e.type==='in';}).reduce(function(s,e){return s+e.qty;},0);
  var outQ=m.filter(function(e){return e.type==='out';}).reduce(function(s,e){return s+e.qty;},0);
  var bal=inQ-outQ;
  document.getElementById('dtl').innerHTML='<span>الإضافات: <strong style="color:var(--gn)">'+inQ+'</strong></span><span>الصرف: <strong style="color:var(--rd)">'+outQ+'</strong></span><span>الرصيد: <strong style="color:'+(bal>=0?'var(--gn)':'var(--rd)')+'">'+bal+'</strong></span>';
  document.getElementById('drs').innerHTML=m.slice(0,3).map(function(e){
    return '<div class="dup-row"><div style="display:flex;gap:8px;align-items:center"><span class="badge '+(e.type==='in'?'badge-in':'badge-out')+'">'+(e.type==='in'?'إضافة':'صرف')+'</span><span>'+e.name+'</span><span>كمية: <strong>'+e.qty+'</strong></span><span style="color:var(--tx3);font-size:10px">'+e.date+'</span></div></div>';
  }).join('');
}

function sub() {
  var bc=document.getElementById('bc').value.trim();
  var name=document.getElementById('nm').value.trim();
  var size=document.getElementById('sz').value.trim();
  var qty=parseInt(document.getElementById('qt').value)||1;
  var price=document.getElementById('pr').value.trim();
  var loc=document.getElementById('lc').value.trim();
  var sup=document.getElementById('sup').value;
  var note=document.getElementById('nt').value.trim();
  if(!bc){tst('أدخل الباركود','r');document.getElementById('bc').focus();return;}
  if(!name){tst('أدخل اسم المنتج','r');document.getElementById('nm').focus();return;}
  var existing=DB.getEntries().filter(function(e){return e.barcode===bc;});
  if(existing.length>0){
    _pending={bc,name,size,qty,price,loc,sup,note};
    var inQ=existing.filter(function(e){return e.type==='in';}).reduce(function(s,e){return s+e.qty;},0);
    var outQ=existing.filter(function(e){return e.type==='out';}).reduce(function(s,e){return s+e.qty;},0);
    document.getElementById('dc-name').textContent=name;
    document.getElementById('dc-bal').textContent=inQ-outQ;
    document.getElementById('dc-qty').textContent=qty;
    document.getElementById('dup-confirm').classList.add('on');
    return;
  }
  doAdd(bc,name,size,qty,price,loc,sup,note);
}

function doAdd(bc,name,size,qty,price,loc,sup,note){
  var now=new Date();
  var ds=now.toLocaleDateString('ar-SA-u-nu-latn')+'  '+now.toLocaleTimeString('ar-SA-u-nu-latn',{hour:'2-digit',minute:'2-digit'});
  DB.addEntry({barcode:bc,name,size,qty,price,location:loc,supplier:sup,note,type:'in',date:ds,addedBy:session.name});
  ['bc','nm','sz','nt','pr'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('qt').value='1';document.getElementById('sup').value='';
  document.getElementById('db').classList.remove('on');
  document.getElementById('bc').focus();
  loadEnt();tst('تمت الإضافة ✓','g');
}

function doConfirmAdd(){
  document.getElementById('dup-confirm').classList.remove('on');
  if(!_pending)return;
  var p=_pending;_pending=null;
  var existing=DB.getEntries().filter(function(e){return e.barcode===p.bc&&e.type==='in';});
  if(existing.length>0){
    DB.updateEntry(existing[0].id,{qty:existing[0].qty+p.qty});
    ['bc','nm','sz','nt','pr'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('qt').value='1';document.getElementById('db').classList.remove('on');
    document.getElementById('bc').focus();loadEnt();tst('تمت إضافة الكمية للرصيد ✓','g');
  } else { doAdd(p.bc,p.name,p.size,p.qty,p.price,p.loc,p.sup,p.note); }
}

function loadEnt(){
  allEnt=DB.getEntries().filter(function(e){return e.type==='in';});
  filtEnt=allEnt.slice();renderTbl(filtEnt);
}
function filterEnt(q){
  if(!q){filtEnt=allEnt.slice();}
  else{var lq=q.toLowerCase();filtEnt=allEnt.filter(function(e){return(e.barcode||'').toLowerCase().includes(lq)||(e.name||'').toLowerCase().includes(lq);});}
  renderTbl(filtEnt);
}
function renderTbl(data){
  document.getElementById('tb').innerHTML=data.slice(0,50).map(function(e){
    return '<tr><td><strong>'+e.name+'</strong></td><td class="td-bc">'+e.barcode+'</td>'+
      '<td style="text-align:center;font-weight:800;font-size:15px;color:var(--gn)">'+e.qty+'</td>'+
      '<td style="color:var(--tx2)">'+(e.price?fmtMoney(e.price):'—')+'</td>'+
      '<td style="font-size:11px;color:var(--tx2)">'+(e.location||'—')+'</td>'+
      '<td style="font-size:10px;color:var(--tx3)">'+e.date+'</td>'+
      '<td><button class="btn btn-danger btn-sm" onclick="delE('+e.id+')">حذف</button></td></tr>';
  }).join('')||'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--tx3)">لا توجد إضافات بعد</td></tr>';
}
function delE(id){confirm2('حذف هذا السجل؟',function(){DB.deleteEntry(id);loadEnt();tst('تم الحذف','r');});}

// Camera
var camOn=false,stream=null,scanTm=null;
async function opCam(){
  var ov=document.getElementById('cov'),vid=document.getElementById('scv'),st=document.getElementById('cst');
  ov.classList.add('on');camOn=true;st.className='cam-st';st.textContent='جاري تشغيل الكاميرا...';
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    vid.srcObject=stream;await vid.play();
    stScan(vid,st);
  }catch(err){st.className='cam-st er';st.textContent=err.name==='NotAllowedError'?'لم يتم السماح بالكاميرا':'تعذّر فتح الكاميرا';}
}
function stScan(vid,st){
  function onF(code){clCam();document.getElementById('bc').value=code;onBc(code);tst('تم مسح الباركود ✓','g');setTimeout(function(){document.getElementById('nm').focus();},300);}
  if(typeof ZXingBrowser!=='undefined'&&ZXingBrowser.BrowserMultiFormatReader){
    try{
      var reader=new ZXingBrowser.BrowserMultiFormatReader();
      var cv=document.createElement('canvas');var ctx=cv.getContext('2d',{willReadFrequently:true});
      st.textContent='وجّه الكاميرا نحو الباركود';
      scanTm=setInterval(function(){
        if(!camOn||vid.readyState<2)return;
        cv.width=vid.videoWidth||640;cv.height=vid.videoHeight||480;
        ctx.drawImage(vid,0,0);
        try{var r=reader.decodeFromCanvas(cv);if(r)onF(r.getText());}catch(e){}
      },200);return;
    }catch(e1){}
  }
  if('BarcodeDetector' in window){
    var det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e','data_matrix','itf']});
    st.textContent='وجّه الكاميرا نحو الباركود';
    scanTm=setInterval(async function(){if(!camOn||vid.readyState<2)return;try{var r=await det.detect(vid);if(r&&r.length)onF(r[0].rawValue);}catch(e){}},250);return;
  }
  st.className='cam-st er';st.textContent='اكتب الباركود أدناه';
  var inp=document.createElement('input');inp.type='text';inp.placeholder='اكتب الباركود ثم Enter...';
  inp.style.cssText='position:absolute;bottom:70px;left:50%;transform:translateX(-50%);width:82%;padding:13px 16px;font-size:16px;font-family:Cairo,sans-serif;background:rgba(10,40,100,.88);color:#E8F4FF;border-top:2px solid rgba(220,235,255,.72);border-left:1px solid rgba(180,210,255,.28);border-right:1px solid rgba(150,185,255,.16);border-bottom:1px solid rgba(0,0,0,.50);border-radius:14px;outline:none;text-align:center;z-index:10';
  inp.onkeydown=function(e){if(e.key==='Enter'&&inp.value.trim())onF(inp.value.trim());};
  document.querySelector('.cam-body').appendChild(inp);setTimeout(function(){inp.focus();},300);
}
function clCam(){camOn=false;clearInterval(scanTm);scanTm=null;if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}document.getElementById('scv').srcObject=null;document.getElementById('cov').classList.remove('on');}

loadEnt();
</script>
</body>
</html>
